# This blueprint deploys two Render Web Services against an EXTERNAL Neon
# Postgres database (not Render's own managed Postgres). DATABASE_URL below
# is intentionally `sync: false` — paste your Neon connection string into
# the Render dashboard after the service is created. See DEPLOYMENT.md for
# the full first-deploy runbook (there's a one-time circular dependency
# between CORS_ORIGINS and NEXT_PUBLIC_API_URL that needs a second pass).

services:
  - type: web
    name: rbac-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECURE_COOKIES
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      # Paste your Neon connection string here (Neon dashboard -> Connect ->
      # "Connection string", pooled or direct both work). Any of
      # postgres:// / postgresql:// / postgresql+asyncpg:// schemes are
      # accepted and normalized automatically, sslmode/channel_binding
      # params included.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # Update this to the deployed frontend URL after first deploy
      # (e.g. https://rbac-frontend.onrender.com) — no trailing slash.
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: rbac-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # Update this to the deployed backend URL + /api/v1 after first deploy
      # (e.g. https://rbac-backend.onrender.com/api/v1).
      - key: NEXT_PUBLIC_API_URL
        sync: false
